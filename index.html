<head>

        content="Free online Image to ASCII converter. Easily transform your photos into text art, Braille, and custom character patterns. Fast, private, and works entirely in your browser.">
    <meta name="keywords"
        content="img2ascii, image to ascii, ascii art generator, braille art converter, text art, convert photo to text, custom ascii pattern, text image maker">
    <meta name="author" content="SoufianoDev">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="img2ascii - Convert Images to Text Art">
    <meta property="og:description"
        content="Turn any picture into stunning ASCII or Braille art instantly. Fully customizable and free to use.">
    <meta property="og:url" content="https://soufianodev.github.io/img2ascii">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="img2ascii - Image to Text Art Converter">
    <meta name="twitter:description"
        content="Turn any picture into stunning ASCII or Braille art instantly. Fully customizable and free to use.">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://soufianodev.github.io/img2ascii" />

    <title>img2ascii - Image to ASCII Art & Braille</title>
    <meta name="description"
        content="Free online Image to ASCII converter. Easily transform your photos into text art, Braille, and custom character patterns." />

    <!-- Prevent Flash of Unstyled Content (FOUC) -->
    <script>
        if (
            localStorage.getItem("theme") === "light" ||
            (!("theme" in localStorage) &&
                !window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
            document.documentElement.classList.remove("dark");
        } else {
            document.documentElement.classList.add("dark");
        }

        // Setup initial language
        const savedLang = localStorage.getItem("language") || "en";
        document.documentElement.lang = savedLang;
        document.documentElement.dir = savedLang === "ar" ? "rtl" : "ltr";
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        md: {
                            bg: "rgb(var(--color-bg) / <alpha-value>)",
                            surface: "rgb(var(--color-surface) / <alpha-value>)",
                            surfaceContainer:
                                "rgb(var(--color-surface-container) / <alpha-value>)",
                            surfaceContainerHigh:
                                "rgb(var(--color-surface-container-high) / <alpha-value>)",
                            primary: "rgb(var(--color-primary) / <alpha-value>)",
                            onPrimary: "rgb(var(--color-on-primary) / <alpha-value>)",
                            primaryContainer:
                                "rgb(var(--color-primary-container) / <alpha-value>)",
                            onPrimaryContainer:
                                "rgb(var(--color-on-primary-container) / <alpha-value>)",
                            onSurface: "rgb(var(--color-on-surface) / <alpha-value>)",
                            onSurfaceVariant:
                                "rgb(var(--color-on-surface-variant) / <alpha-value>)",
                            outline: "rgb(var(--color-outline) / <alpha-value>)",
                        },
                    },
                    fontFamily: {
                        sans: ["Roboto", "Tajawal", "system-ui", "sans-serif"],
                        mono: ['"Fira Code"', '"Courier New"', "monospace"],
                    },
                    transitionProperty: {
                        theme:
                            "background-color, border-color, color, fill, stroke, box-shadow, transform",
                    },
                },
            },
        };
    </script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Roboto:wght@400;500;700&family=Tajawal:wght@400;500;700&display=swap");

        :root {
            /* Light Mode Palette */
            --color-bg: 248 249 252;
            --color-surface: 255 255 255;
            --color-surface-container: 241 243 247;
            --color-surface-container-high: 232 234 239;
            --color-primary: 67 56 202;
            --color-on-primary: 255 255 255;
            --color-primary-container: 224 231 255;
            --color-on-primary-container: 49 46 129;
            --color-on-surface: 26 28 30;
            --color-on-surface-variant: 83 87 96;
            --color-outline: 140 146 157;
        }

        .dark {
            /* Dark Mode Palette */
            --color-bg: 15 17 21;
            --color-surface: 22 25 31;
            --color-surface-container: 30 34 43;
            --color-surface-container-high: 40 46 56;
            --color-primary: 165 180 252;
            --color-on-primary: 26 28 30;
            --color-primary-container: 49 46 129;
            --color-on-primary-container: 224 231 255;
            --color-on-surface: 226 228 233;
            --color-on-surface-variant: 156 163 175;
            --color-outline: 75 85 99;
        }

        body {
            background-color: rgb(var(--color-bg));
            color: rgb(var(--color-on-surface));
            transition:
                background-color 0.4s ease,
                color 0.4s ease;
        }

        /* * PROFESSIONAL TERMINAL CANVAS */
        .output-container {
            flex-grow: 1;
            min-height: 400px;
            background-color: #050505 !important;
            color: #f1f5f9 !important;
            direction: ltr !important;
            /* ASCII/Braille is always LTR */
            overflow: auto;
            /* ALLOW SCROLLING for large images */
            border-radius: 0 0 24px 24px;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            padding: 1.5rem;
            text-align: center;
            /* Center horizontally if smaller than container */
        }

        /* Scrollbar Styling */
        .output-container::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        .output-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-container::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            border: 3px solid #050505;
        }

        .output-container::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .ascii-output {
            font-family: "Fira Code", "Courier New", monospace;
            white-space: pre;
            text-align: left;
            /* Keep ASCII structure aligned left */
            display: inline-block;
            /* Wraps content perfectly */
            line-height: 1 !important;
            letter-spacing: 0;
            font-weight: 400;
            font-size: 10px;
            /* FIXED FONT SIZE: So the slider changes actual size */
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* MD3 Slider Styling with perfect RTL support */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: linear-gradient(var(--slider-dir, to right),
                    rgb(var(--color-primary)) var(--slider-percent, 50%),
                    rgb(var(--color-surface-container-high)) var(--slider-percent, 50%));
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            margin: 12px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: rgb(var(--color-primary));
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(var(--color-primary), 0.12);
            transition:
                box-shadow 0.2s,
                transform 0.2s;
        }

        input[type="range"]:hover::-webkit-slider-thumb {
            box-shadow: 0 0 0 10px rgb(var(--color-primary) / 0.12);
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.15);
            box-shadow: 0 0 0 16px rgb(var(--color-primary) / 0.24);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid rgb(var(--color-primary));
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Dropdown transition */
        .dropdown-menu {
            transform-origin: top;
            transition:
                opacity 0.2s ease,
                transform 0.2s ease;
        }

        .dropdown-menu.hidden {
            opacity: 0;
            transform: scaleY(0.95);
            pointer-events: none;
        }

        .dropdown-menu.visible {
            opacity: 1;
            transform: scaleY(1);
            pointer-events: auto;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col p-4 md:p-6 lg:p-8 selection:bg-md-primary selection:text-md-onPrimary">
    <!-- Header -->
    <header class="max-w-7xl w-full mx-auto mb-8 flex items-center justify-between relative z-50">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-md-primaryContainer rounded-xl flex items-center justify-center text-md-onPrimaryContainer shadow-sm">
                <!-- Restored Original Icon -->
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
            </div>
            <div>
                <!-- Restored Original Branding -->
                <h1 class="text-2xl font-bold text-md-onSurface tracking-tight">
                    ImageToAscii
                </h1>
                <p class="text-md-onSurfaceVariant text-sm font-medium" data-i18n="subtitle">
                    Convert images to ASCII & Braille
                </p>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-3">
            <!-- Language Dropdown -->
            <div class="relative">
                <button id="langBtn"
                    class="flex items-center gap-2 px-3 py-2 rounded-full hover:bg-md-surfaceContainerHigh text-md-onSurfaceVariant hover:text-md-onSurface transition-theme duration-300 font-medium text-sm border border-md-surfaceContainer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
                    </svg>
                    <span id="currentLangText">EN</span>
                </button>

                <div id="langDropdown"
                    class="dropdown-menu hidden absolute top-full mt-2 ltr:right-0 rtl:left-0 w-36 bg-md-surface border border-md-surfaceContainer shadow-xl rounded-xl overflow-hidden z-50">
                    <button onclick="setLanguage('en')"
                        class="w-full text-start px-4 py-3 hover:bg-md-surfaceContainerHigh text-md-onSurface text-sm font-medium transition-colors">
                        English
                    </button>
                    <button onclick="setLanguage('ar')"
                        class="w-full text-start px-4 py-3 hover:bg-md-surfaceContainerHigh text-md-onSurface text-sm font-medium transition-colors font-sans">
                        العربية
                    </button>
                </div>
            </div>

            <!-- Theme Toggle -->
            <button id="themeToggleBtn"
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-md-surfaceContainerHigh text-md-onSurfaceVariant hover:text-md-onSurface transition-theme duration-300 border border-md-surfaceContainer">
                <svg id="iconSun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <svg id="iconMoon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
        <!-- Left Column: Controls -->
        <div class="lg:col-span-4 flex flex-col gap-6">
            <!-- Input Area -->
            <div
                class="bg-md-surface rounded-[24px] p-6 shadow-sm border border-md-surfaceContainer transition-theme duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-bold text-md-onSurface" data-i18n="imageSource">
                        Image Source
                    </h2>
                    <!-- Reset Button -->
                    <button id="resetBtn"
                        class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-md-surfaceContainerHigh text-md-onSurfaceVariant hover:text-md-primary transition-theme duration-300"
                        title="Reset All">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>

                <div id="dropZone"
                    class="w-full flex flex-col items-center justify-center px-6 py-8 bg-md-surfaceContainer rounded-[16px] border-2 border-dashed border-md-outline/40 cursor-pointer hover:bg-md-surfaceContainerHigh hover:border-md-primary transition-all text-center group">
                    <div
                        class="w-12 h-12 bg-md-surfaceContainerHigh group-hover:bg-md-primaryContainer rounded-full flex items-center justify-center mb-3 transition-colors">
                        <svg class="w-6 h-6 text-md-onSurfaceVariant group-hover:text-md-primary transition-colors"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-md-onSurface" data-i18n="clickOrDrag">Click or drag image
                        here</span>
                    <span class="text-xs text-md-onSurfaceVariant mt-1" dir="ltr">JPG, PNG, WEBP • Paste (Ctrl+V)</span>
                    <input type="file" id="imageInput" class="hidden" accept="image/*" />
                </div>
            </div>

            <!-- Engine Settings -->
            <div
                class="bg-md-surface rounded-[24px] p-6 shadow-sm border border-md-surfaceContainer flex-grow transition-theme duration-300">
                <h2 class="text-base font-bold mb-6 text-md-onSurface flex items-center gap-2">
                    <svg class="w-5 h-5 text-md-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                    </svg>
                    <span data-i18n="tuning">Generation Settings</span>
                </h2>

                <div class="space-y-6">
                    <!-- Resolution Slider -->
                    <div>
                        <label
                            class="flex justify-between text-xs font-bold tracking-wide text-md-onSurfaceVariant mb-2 uppercase">
                            <span data-i18n="resWidth">Size (Width)</span>
                            <span id="widthDisplay"
                                class="font-mono text-md-primary bg-md-primaryContainer text-md-onPrimaryContainer px-2 py-0.5 rounded text-[10px]">150
                                chars</span>
                        </label>
                        <input type="range" id="widthSlider" min="50" max="400" value="150" class="w-full mt-2" />
                    </div>

                    <!-- Sharpening (Edge Enhancement) Slider -->
                    <div>
                        <label
                            class="flex justify-between text-xs font-bold tracking-wide text-md-onSurfaceVariant mb-2 uppercase">
                            <span data-i18n="sharpening">Edge Sharpening</span>
                            <span id="sharpenDisplay"
                                class="font-mono text-md-primary bg-md-primaryContainer text-md-onPrimaryContainer px-2 py-0.5 rounded text-[10px]">50%</span>
                        </label>
                        <input type="range" id="sharpenSlider" min="0" max="100" value="50" class="w-full mt-2" />
                        <p class="text-[10px] text-md-onSurfaceVariant mt-1" data-i18n="sharpenDesc">
                            Enhances outlines (Crucial for crisp lines)
                        </p>
                    </div>

                    <!-- Gamma / Contrast Slider -->
                    <div>
                        <label
                            class="flex justify-between text-xs font-bold tracking-wide text-md-onSurfaceVariant mb-2 uppercase">
                            <span data-i18n="contrast">Threshold (Gamma)</span>
                            <span id="detailDisplay"
                                class="font-mono text-md-primary bg-md-primaryContainer text-md-onPrimaryContainer px-2 py-0.5 rounded text-[10px]">50%</span>
                        </label>
                        <input type="range" id="detailSlider" min="1" max="100" value="50" class="w-full mt-2" />
                    </div>

                    <!-- NEW: Zoom / Display Size Slider -->
                    <div>
                        <label
                            class="flex justify-between text-xs font-bold tracking-wide text-md-onSurfaceVariant mb-2 uppercase">
                            <span data-i18n="displayZoom">Display Zoom</span>
                            <span id="zoomDisplay"
                                class="font-mono text-md-primary bg-md-primaryContainer text-md-onPrimaryContainer px-2 py-0.5 rounded text-[10px]">10px</span>
                        </label>
                        <input type="range" id="zoomSlider" min="2" max="50" value="10" class="w-full mt-2" />
                    </div>

                    <hr class="border-md-surfaceContainerHigh" />

                    <!-- Dithering Toggle -->
                    <label
                        class="flex items-center gap-3 p-3 bg-md-surfaceContainer rounded-xl cursor-pointer hover:bg-md-surfaceContainerHigh transition-theme duration-200 border border-transparent hover:border-md-outline/20">
                        <div class="relative flex items-center">
                            <input type="checkbox" id="ditherCheck"
                                class="peer appearance-none w-5 h-5 border-2 border-md-outline rounded-md checked:bg-md-primary checked:border-md-primary transition-all" />

                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>

                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-md-onSurface select-none" data-i18n="dithering">Smooth

                            <span class="text-xs text-md-onSurfaceVariant select-none" data-i18n="ditherDesc">Spreads
                                dots beautifully for gradients
                                (Floyd-Steinberg)</span>

                    <!-- Invert Toggle -->

                            </svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-md-onSurface select-none"
                                data-i18n="invertValues">Invert Matrix</span>
                            <span class="text-xs text-md-onSurfaceVariant select-none" data-i18n="invertDesc">Inverts
                                the logic of drawn dots (Black vs White
                                background)</span>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Right Column: Black Terminal Output -->
        <div class="lg:col-span-8 flex flex-col">
            <div
                class="bg-md-surface rounded-[24px] shadow-sm border border-md-surfaceContainer flex flex-col h-full overflow-hidden relative transition-theme duration-300">
                <!-- Output Header -->
                <div
                    class="px-6 py-4 border-b border-md-surfaceContainer flex items-center justify-between bg-md-surface z-10">
                    <h2 class="text-base font-bold text-md-onSurface flex items-center gap-2">
                        <svg class="w-5 h-5 text-md-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                        </svg>
                        <span data-i18n="outputCanvas">Output Canvas</span>
                    </h2>

                    <div class="flex items-center gap-2">
                        <button id="copyBtn" disabled

                            <span dir="ltr">Save .txt</span>

                </div>

                <!-- True Black Canvas Area -->
                <div class="output-container" id="scrollContainer">
                    <!-- Loading Overlay -->
                    <div id="loadingOverlay"
                        class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-20 hidden backdrop-blur-sm transition-all duration-300">
                        <div class="spinner mb-4"></div>
                        <span class="text-sm font-bold text-white tracking-widest uppercase"
                            data-i18n="rendering">Processing...</span>
                    </div>

                    <!-- Placeholder -->
                    <div id="placeholderText"
                        class="absolute inset-0 flex flex-col items-center justify-center text-white/40 select-none">
                        <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="text-sm font-bold uppercase tracking-wider" data-i18n="awaitingInput">
                            Awaiting Image
                        </p>
                    </div>

                    <!-- The Output -->
                    <div id="asciiOutput" class="ascii-output"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Hidden calculation element to measure exact font aspect ratio -->
    <span id="fontMeasurer" class="absolute opacity-0 pointer-events-none whitespace-pre" style="
        font-family: &quot;Fira Code&quot;, &quot;Courier New&quot;, monospace;
        font-size: 100px;
        line-height: 1;
      ">M</span>

    <script>
        // ==========================================
        // TRANSLATION ENGINE (I18N)
        // ==========================================
        const translations = {
            en: {
                subtitle: "Convert images to ASCII & Braille",
                tuning: "Generation Settings",
                imageSource: "Image Source",
                clickOrDrag: "Click or drag image here",
                resWidth: "Size (Width)",
                sharpening: "Edge Sharpening",
                sharpenDesc: "Enhances outlines (Crucial for crisp lines)",
                contrast: "Threshold (Gamma)",
                displayZoom: "Display Zoom (Font Size)",
                invertValues: "Invert Matrix",
                invertDesc:
                    "Inverts the logic of drawn dots (Black vs White background)",
                dithering: "Smooth Dithering (Dots)",
                ditherDesc:
                    "Spreads dots beautifully for gradients (Floyd-Steinberg)",
                outputCanvas: "Output Canvas",
                copyText: "Copy text",
                copied: "Copied!",
                rendering: "Processing...",
                awaitingInput: "Awaiting Image",
                errorImg: "Please provide a valid image file.",
            },
            ar: {
                subtitle: "تحويل الصور إلى نصوص وبرايل",
                tuning: "إعدادات التحويل",
                imageSource: "مصدر الصورة",
                clickOrDrag: "انقر أو اسحب الصورة هنا",
                resWidth: "الحجم (العرض)",
                sharpening: "الحدة وإبراز الحواف",
                sharpenDesc: "يقوي الخطوط (مهم جداً لجعل التفاصيل حادة ودقيقة)",
                contrast: "التباين (السطوع)",
                displayZoom: "حجم العرض (التقريب)",
                invertValues: "عكس الألوان",
                invertDesc: "يغير منطق الرسم (خلفية بيضاء أم سوداء)",
                dithering: "تنعيم التفاصيل (Dithering)",
                ditherDesc: "ينشر النقاط بذكاء لرسم التدرجات والظلال المخفية",
                outputCanvas: "شاشة العرض",
                copyText: "نسخ النص",
                copied: "تم النسخ!",
                rendering: "جاري المعالجة...",
                awaitingInput: "بانتظار إدخال صورة",
                errorImg: "الرجاء إدخال ملف صورة صالح.",
            },
        };

        let currentLang = document.documentElement.lang;

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
            localStorage.setItem("language", lang);

            document.getElementById("currentLangText").textContent =
                lang === "ar" ? "AR" : "EN";

            document.querySelectorAll("[data-i18n]").forEach((el) => {
                const key = el.getAttribute("data-i18n");
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });

            // Update sliders direction
            updateSliderFill(document.getElementById("widthSlider"));
            updateSliderFill(document.getElementById("detailSlider"));
            updateSliderFill(document.getElementById("sharpenSlider"));
            updateSliderFill(document.getElementById("zoomSlider"));

            document.getElementById("langDropdown").classList.remove("visible");
            document.getElementById("langDropdown").classList.add("hidden");
        }

        setLanguage(currentLang);

        document.getElementById("langBtn").addEventListener("click", (e) => {
            e.stopPropagation();
            const dd = document.getElementById("langDropdown");
            if (dd.classList.contains("hidden")) {
                dd.classList.remove("hidden");
                dd.classList.add("visible");
            } else {
                dd.classList.remove("visible");
                dd.classList.add("hidden");
            }
        });
        document.addEventListener("click", () => {
            const dd = document.getElementById("langDropdown");
            dd.classList.remove("visible");
            dd.classList.add("hidden");
        });

        // ==========================================
        // THEME MANAGEMENT
        // ==========================================
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const htmlElement = document.documentElement;

        function applyTheme(isDark) {
            if (isDark) {
                htmlElement.classList.add("dark");
                localStorage.setItem("theme", "dark");
            } else {
                htmlElement.classList.remove("dark");
                localStorage.setItem("theme", "light");
            }
        }
        themeToggleBtn.addEventListener("click", () =>
            applyTheme(!htmlElement.classList.contains("dark")),
        );

        // ==========================================
        // DOM ELEMENTS & STATE
        // ==========================================
        const dropZone = document.getElementById("dropZone");
        const imageInput = document.getElementById("imageInput");

        const widthSlider = document.getElementById("widthSlider");
        const widthDisplay = document.getElementById("widthDisplay");
        const detailSlider = document.getElementById("detailSlider");
        const detailDisplay = document.getElementById("detailDisplay");
        const sharpenSlider = document.getElementById("sharpenSlider");
        const sharpenDisplay = document.getElementById("sharpenDisplay");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomDisplay = document.getElementById("zoomDisplay");

        const invertCheck = document.getElementById("invertCheck");
        const ditherCheck = document.getElementById("ditherCheck");

        const asciiOutput = document.getElementById("asciiOutput");
        const placeholderText = document.getElementById("placeholderText");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const scrollContainer = document.getElementById("scrollContainer");
        const fontMeasurer = document.getElementById("fontMeasurer");

        const copyBtn = document.getElementById("copyBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const resetBtn = document.getElementById("resetBtn");

        let currentImage = null;
        let processTimeout = null;
        let exactFontRatio = 0.5;

        // Calculate actual font ratio
        window.addEventListener("load", () => {
            const rect = fontMeasurer.getBoundingClientRect();
            if (rect.height > 0 && rect.width > 0) {
                exactFontRatio = rect.width / rect.height;
            } else {
                exactFontRatio = 0.5;
            }
        });

        // ==========================================
        // INPUT HANDLING
        // ==========================================
        dropZone.addEventListener("click", () => imageInput.click());
        imageInput.addEventListener("change", (e) => handleFiles(e.target.files));

        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        ["dragenter", "dragover"].forEach((eventName) =>
            dropZone.addEventListener(eventName, () =>
                dropZone.classList.add(
                    "border-md-primary",
                    "bg-md-primaryContainer/10",
                ),
            ),
        );
        ["dragleave", "drop"].forEach((eventName) =>
            dropZone.addEventListener(eventName, () =>
                dropZone.classList.remove(
                    "border-md-primary",
                    "bg-md-primaryContainer/10",
                ),
            ),
        );

        dropZone.addEventListener("drop", (e) =>
            handleFiles(e.dataTransfer.files),
        );

        window.addEventListener("paste", (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === "file" && item.type.includes("image/")) {
                    handleFiles([item.getAsFile()]);
                    break;
                }
            }
        });

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            const file = files[0];
            if (!file.type.startsWith("image/")) {
                alert(translations[currentLang].errorImg);
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    queueProcessing();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ==========================================
        // UI BINDINGS & SLIDERS
        // ==========================================
        function updateSliderFill(slider) {
            const min = slider.min || 0;
            const max = slider.max || 100;
            const val = slider.value;
            const percent = ((val - min) / (max - min)) * 100;
            const dir = document.documentElement.dir;
            slider.style.setProperty("--slider-percent", `${percent}%`);
            slider.style.setProperty(
                "--slider-dir",
                dir === "rtl" ? "to left" : "to right",
            );
        }

        [widthSlider, detailSlider, sharpenSlider, zoomSlider].forEach(
            (slider) => {
                updateSliderFill(slider);
                slider.addEventListener("input", () => {
                    if (slider === widthSlider)
                        widthDisplay.textContent = slider.value + " chars";
                    if (slider === detailSlider)
                        detailDisplay.textContent = slider.value + "%";
                    if (slider === sharpenSlider)
                        sharpenDisplay.textContent = slider.value + "%";
                    if (slider === zoomSlider) {
                        zoomDisplay.textContent = slider.value + "px";
                        document.getElementById("asciiOutput").style.fontSize =
                            slider.value + "px";
                    }
                    updateSliderFill(slider);
                    if (slider !== zoomSlider) queueProcessing(200);
                });
            },
        );

        invertCheck.addEventListener("change", () => queueProcessing());
        ditherCheck.addEventListener("change", () => queueProcessing());

        resetBtn.addEventListener("click", () => {
            currentImage = null;
            widthSlider.value = 150;
            widthDisplay.textContent = "150 chars";
            sharpenSlider.value = 50;
            sharpenDisplay.textContent = "50%";
            detailSlider.value = 50;
            detailDisplay.textContent = "50%";
            zoomSlider.value = 10;
            zoomDisplay.textContent = "10px";
            document.getElementById("asciiOutput").style.fontSize = "10px";
            updateSliderFill(widthSlider);
            updateSliderFill(sharpenSlider);
            updateSliderFill(detailSlider);
            updateSliderFill(zoomSlider);
            invertCheck.checked = false;
            ditherCheck.checked = false;

            asciiOutput.textContent = "";
            asciiOutput.style.opacity = "0";
            placeholderText.style.display = "flex";

            copyBtn.disabled = true;
            downloadBtn.disabled = true;
            imageInput.value = "";
        });

        // ==========================================
        // BRAILLE HIGH-FIDELITY RENDERING ENGINE
        // ==========================================
        function queueProcessing(delay = 50) {
            if (!currentImage) return;
            loadingOverlay.classList.remove("hidden");
            clearTimeout(processTimeout);
            processTimeout = setTimeout(() => {
                requestAnimationFrame(() => generateBraille());
            }, delay);
        }

        // Custom Edge Convolution (Sharpen)
        function applySharpenFilter(pixels, w, h, amount) {
            if (amount <= 0) return pixels;

            const src = new Uint8ClampedArray(pixels);
            const dst = pixels;
            const w4 = w * 4;

            const mix = (amount / 100) * 1.5;
            const centerWeight = 1 + 4 * mix;
            const sideWeight = -mix;

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const off = (y * w + x) * 4;
                    for (let c = 0; c < 3; c++) {
                        let val =
                            src[off + c] * centerWeight +
                            src[off - w4 + c] * sideWeight +
                            src[off + w4 + c] * sideWeight +
                            src[off - 4 + c] * sideWeight +
                            src[off + 4 + c] * sideWeight;
                        dst[off + c] = val;
                    }
                }
            }
            return dst;
        }

        function generateBraille() {
            if (!currentImage) return;

            // Target Dimensions (in Characters)
            const targetCharW = Math.max(1, parseInt(widthSlider.value) || 150);
            const gammaAmt = parseInt(detailSlider.value) || 50;
            const sharpenAmt = parseInt(sharpenSlider.value) || 50;
            const invert = invertCheck.checked;
            const applyDither = ditherCheck.checked;

            const exactFontRatio = 0.5; // Braille characters are exactly 0.5 width/height ratio

            let imgRatio = 1;
            if (currentImage.width > 0 && currentImage.height > 0) {
                imgRatio = currentImage.height / currentImage.width;
            }

            // Calculate height in characters
            const targetCharH = Math.max(
                1,
                Math.floor(targetCharW * imgRatio * exactFontRatio),
            );

            // Braille uses a 2x4 dot matrix per character.
            const processW = targetCharW * 2;
            const processH = targetCharH * 4;

            // Intermediate scaling for detail preservation
            const midW = Math.max(1, processW * 2);
            const midH = Math.max(1, processH * 2);

            const oc = document.createElement("canvas");
            const octx = oc.getContext("2d", { willReadFrequently: true });
            oc.width = midW;
            oc.height = midH;
            octx.imageSmoothingEnabled = true;
            octx.imageSmoothingQuality = "high";
            octx.drawImage(currentImage, 0, 0, midW, midH);

            // Apply Sharpening Matrix
            if (sharpenAmt > 0) {
                let midData = octx.getImageData(0, 0, midW, midH);
                midData.data.set(
                    applySharpenFilter(midData.data, midW, midH, sharpenAmt),
                );
                octx.putImageData(midData, 0, 0);
            }

            // Final render to exact pixel grid mapping to braille dots
            const finalCanvas = document.createElement("canvas");
            const fctx = finalCanvas.getContext("2d", { willReadFrequently: true });
            finalCanvas.width = processW;
            finalCanvas.height = processH;
            fctx.imageSmoothingEnabled = true;
            fctx.imageSmoothingQuality = "high";
            fctx.drawImage(oc, 0, 0, midW, midH, 0, 0, processW, processH);

            const imgData = fctx.getImageData(0, 0, processW, processH);
            const pixels = imgData.data;

            // Gamma Curve (Threshold logic)
            const gamma = Math.pow(gammaAmt / 50, 1.5);

            let lums = [];
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i + 3] > 10) {
                    lums.push(
                        0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2],
                    );
                }
            }
            lums.sort((a, b) => a - b);

            let minLum = lums[Math.floor(lums.length * 0.01)] || 0;
            let maxLum = lums[Math.floor(lums.length * 0.99)] || 255;
            if (minLum >= maxLum) {
                minLum = 0;
                maxLum = 255;
            }

            const lumMap = new Float32Array(processW * processH);
            for (let y = 0; y < processH; y++) {
                for (let x = 0; x < processW; x++) {
                    const i = (y * processW + x) * 4;
                    let lum = 255;
                    if (pixels[i + 3] > 10) {
                        const rawLum =
                            0.299 * pixels[i] +
                            0.587 * pixels[i + 1] +
                            0.114 * pixels[i + 2];
                        let normalized = (rawLum - minLum) / (maxLum - minLum);
                        normalized = Math.max(0, Math.min(1, normalized));
                        normalized = Math.pow(normalized, gamma);
                        lum = normalized * 255;
                    }
                    lumMap[y * processW + x] = lum;
                }
            }

            // Floyd-Steinberg Dithering
            if (applyDither) {
                for (let y = 0; y < processH; y++) {
                    for (let x = 0; x < processW; x++) {
                        const idx = y * processW + x;
                        const oldVal = lumMap[idx];

                        const newVal = oldVal < 128 ? 0 : 255;
                        lumMap[idx] = newVal;

                        const err = oldVal - newVal;
                        if (x + 1 < processW) lumMap[idx + 1] += (err * 7) / 16;
                        if (y + 1 < processH) {
                            if (x - 1 >= 0) lumMap[idx + processW - 1] += (err * 3) / 16;
                            lumMap[idx + processW] += (err * 5) / 16;
                            if (x + 1 < processW)
                                lumMap[idx + processW + 1] += (err * 1) / 16;
                        }
                    }
                }
            }

            // Assemble Braille Characters
            let asciiStr = "";
            const bitMap = [
                [1, 8],
                [2, 16],
                [4, 32],
                [64, 128],
            ];

            for (let cy = 0; cy < targetCharH; cy++) {
                for (let cx = 0; cx < targetCharW; cx++) {
                    let dotValue = 0;

                    for (let dy = 0; dy < 4; dy++) {
                        for (let dx = 0; dx < 2; dx++) {
                            const px = cx * 2 + dx;
                            const py = cy * 4 + dy;
                            const idx = py * processW + px;

                            let isDotOn = lumMap[idx] >= 128;
                            if (invert) isDotOn = !isDotOn;

                            if (isDotOn) {
                                dotValue += bitMap[dy][dx];
                            }
                        }
                    }
                    asciiStr += String.fromCharCode(10240 + dotValue);
                }
                asciiStr += "\n";
            }

            // Commit to DOM
            asciiOutput.textContent = asciiStr;
            placeholderText.style.display = "none";
            asciiOutput.style.opacity = "1";

            copyBtn.disabled = false;
            downloadBtn.disabled = false;
            setTimeout(() => loadingOverlay.classList.add("hidden"), 50);
        }

        // ==========================================
        // OUTPUT ACTIONS
        // ==========================================
        copyBtn.addEventListener("click", async () => {
            const textToCopy = asciiOutput.textContent;
            if (!textToCopy) return;

            const copyIcon = document.getElementById("copyIcon");
            const copySuccessIcon = document.getElementById("copySuccessIcon");
            const copyText = document.getElementById("copyText");

            const showSuccess = () => {
                copyIcon.classList.add("hidden");
                copySuccessIcon.classList.remove("hidden");
                copyText.textContent = translations[currentLang].copied;
                copyBtn.classList.add(
                    "bg-emerald-500/10",
                    "text-emerald-500",
                    "border",
                    "border-emerald-500/20",
                );

                setTimeout(() => {
                    copyIcon.classList.remove("hidden");
                    copySuccessIcon.classList.add("hidden");
                    copyText.textContent = translations[currentLang].copyText;
                    copyBtn.classList.remove(
                        "bg-emerald-500/10",
                        "text-emerald-500",
                        "border",
                        "border-emerald-500/20",
                    );
                }, 2000);
            };

            const fallbackCopyTextToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.top = "0";
                textArea.style.left = "0";
                textArea.style.width = "2em";
                textArea.style.height = "2em";
                textArea.style.padding = "0";
                textArea.style.border = "none";
                textArea.style.outline = "none";
                textArea.style.boxShadow = "none";
                textArea.style.background = "transparent";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    const successful = document.execCommand("copy");
                    if (successful) showSuccess();
                    else console.error("Fallback copy failed");
                } catch (err) {
                    console.error("Fallback copy error", err);
                }
                document.body.removeChild(textArea);
            };

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                    showSuccess();
                } else {
                    fallbackCopyTextToClipboard(textToCopy);
                }
            } catch (err) {
                console.warn("Clipboard API failed, using fallback", err);
                fallbackCopyTextToClipboard(textToCopy);
            }
        });

        downloadBtn.addEventListener("click", () => {
            if (!asciiOutput.textContent) return;
            const blob = new Blob([asciiOutput.textContent], {
                type: "text/plain",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `braille-art-${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
