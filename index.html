    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Roboto:wght@400;500;700&display=swap');

        /* Modern MD3 Color System (Neutral Blue-Gray Base) */

    <script>
        // ==========================================
        // THEME MANAGEMENT (Dark/Light Mode)
        // ==========================================
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;

        function applyTheme(isDark) {
            if (isDark) {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            const isDark = htmlElement.classList.contains('dark');
            applyTheme(!isDark);
        });

        // ==========================================
        // DOM ELEMENTS & STATE
        // ==========================================
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        const presetSelect = document.getElementById('presetSelect');
        const patternInput = document.getElementById('patternInput');
        const widthSlider = document.getElementById('widthSlider');
        const widthDisplay = document.getElementById('widthDisplay');
        const invertCheck = document.getElementById('invertCheck');
        
        const asciiOutput = document.getElementById('asciiOutput');
        const placeholderText = document.getElementById('placeholderText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const scrollContainer = document.getElementById('scrollContainer');
        
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const copySuccessIcon = document.getElementById('copySuccessIcon');
        const copyText = document.getElementById('copyText');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        const PRESETS = {
            'classic': ' .:-=+*#%@',
            'minimal': ' :+#',
            'blocks': ' ░▒▓█'
        };

        let currentImage = null;
        let processTimeout = null;

        // ==========================================
        // INPUT HANDLING
        // ==========================================
        
        dropZone.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => handleFiles(e.target.files));

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('border-md-primary', 'bg-md-primaryContainer/10'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-md-primary', 'bg-md-primaryContainer/10'), false);
        });
        
        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));

        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.includes('image/')) {
                    handleFiles([item.getAsFile()]);
                    break;
                }
            }
        });

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            const file = files[0];
            if (!file.type.startsWith('image/')) {
                alert('Please provide a valid image file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    queueProcessing();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ==========================================
        // UI BINDINGS
        // ==========================================

        function updateSliderFill() {
            const min = widthSlider.min || 20;
            const max = widthSlider.max || 400;
            const val = widthSlider.value;
            const percent = ((val - min) / (max - min)) * 100;
            widthSlider.style.setProperty('--slider-percent', `${percent}%`);
        }

        updateSliderFill();

        widthSlider.addEventListener('input', () => {
            widthDisplay.textContent = widthSlider.value + 'px';
            updateSliderFill();
            queueProcessing(150);
        });

        presetSelect.addEventListener('change', () => {
            const val = presetSelect.value;
            if (val === 'braille') {
                patternInput.disabled = true;
                patternInput.value = '⣿⣾⣷⣆⣄⡤⢄⠤⠄'; 
            } else {
                patternInput.disabled = false;
                if (val !== 'custom') {
                    patternInput.value = PRESETS[val];
                }
            }
            queueProcessing();
        });

        patternInput.addEventListener('input', () => {
            presetSelect.value = 'custom';
            queueProcessing(300);
        });

        invertCheck.addEventListener('change', () => queueProcessing());

        resetBtn.addEventListener('click', () => {
            currentImage = null;
            presetSelect.value = 'minimal';
            patternInput.value = ' :+#';
            patternInput.disabled = false;
            widthSlider.value = 100;
            widthDisplay.textContent = '100px';
            updateSliderFill();
            invertCheck.checked = false;
            
            asciiOutput.textContent = '';
            asciiOutput.style.opacity = '0';
            placeholderText.style.display = 'flex';
            
            copyBtn.disabled = true;
            downloadBtn.disabled = true;
            imageInput.value = '';
        });

        // ==========================================
        // CORE RENDERING ENGINE
        // ==========================================

        function queueProcessing(delay = 50) {
            if (!currentImage) return;
            loadingOverlay.classList.remove('hidden');
            clearTimeout(processTimeout);
            processTimeout = setTimeout(() => {
                requestAnimationFrame(() => generateASCII());
            }, delay);
        }

        function generateASCII() {
            if (!currentImage) return;

            const targetCharWidth = parseInt(widthSlider.value);
            const preset = presetSelect.value;
            const invert = invertCheck.checked;
            
            let asciiStr = "";

            if (preset === 'braille') {
                asciiOutput.style.setProperty('--ascii-line-height', '1');
                
                const pixelWidth = targetCharWidth * 2;
                const scale = pixelWidth / currentImage.width;
                const pixelHeight = Math.floor(currentImage.height * scale);
                const targetCharHeight = Math.floor(pixelHeight / 4);
                
                canvas.width = pixelWidth;
                canvas.height = targetCharHeight * 4;
                
                ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;

                const getLuminance = (x, y) => {
                    if (x >= canvas.width || y >= canvas.height) return 0;
                    const idx = (y * canvas.width + x) * 4;
                    return 0.2126 * pixels[idx] + 0.7152 * pixels[idx+1] + 0.0722 * pixels[idx+2];
                };

                const threshold = 128;

                for (let y = 0; y < canvas.height; y += 4) {
                    for (let x = 0; x < canvas.width; x += 2) {
                        let dotValue = 0;
                        const isDotOn = (bx, by) => {
                            let lum = getLuminance(bx, by);
                            return invert ? lum < threshold : lum > threshold;
                        };

                        if (isDotOn(x, y)) dotValue += 1;
                        if (isDotOn(x, y+1)) dotValue += 2;
                        if (isDotOn(x, y+2)) dotValue += 4;
                        if (isDotOn(x+1, y)) dotValue += 8;
                        if (isDotOn(x+1, y+1)) dotValue += 16;
                        if (isDotOn(x+1, y+2)) dotValue += 32;
                        if (isDotOn(x, y+3)) dotValue += 64;
                        if (isDotOn(x+1, y+3)) dotValue += 128;

                        asciiStr += String.fromCharCode(10240 + dotValue);
                    }
                    asciiStr += "\n";
                }
            } else {
                asciiOutput.style.setProperty('--ascii-line-height', '0.65'); 
                
                const scale = targetCharWidth / currentImage.width;
                const targetCharHeight = Math.floor((currentImage.height * scale) * 0.55); 

                canvas.width = targetCharWidth;
                canvas.height = targetCharHeight;

                ctx.drawImage(currentImage, 0, 0, targetCharWidth, targetCharHeight);
                const imageData = ctx.getImageData(0, 0, targetCharWidth, targetCharHeight);
                const pixels = imageData.data;

                let customPattern = patternInput.value || " ";
                const asciiChars = customPattern.split('');
                if (invert) asciiChars.reverse();
                
                const charCount = asciiChars.length - 1;

                for (let i = 0; i < pixels.length; i += 4) {
                    const r = pixels[i];
                    const g = pixels[i+1];
                    const b = pixels[i+2];
                    
                    const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    const charIndex = Math.round((luminance / 255) * charCount);
                    
                    asciiStr += asciiChars[Math.max(0, Math.min(charIndex, charCount))];
                    if (((i / 4) + 1) % targetCharWidth === 0) {
                        asciiStr += "\n";
                    }
                }
            }

            asciiOutput.textContent = asciiStr;
            placeholderText.style.display = 'none';
            asciiOutput.style.opacity = '1';
            
            copyBtn.disabled = false;
            downloadBtn.disabled = false;
            
            scrollContainer.scrollTop = 0;
            scrollContainer.scrollLeft = Math.max(0, (asciiOutput.offsetWidth - scrollContainer.offsetWidth) / 2);

            setTimeout(() => loadingOverlay.classList.add('hidden'), 100);
        }

        // ==========================================
        // OUTPUT ACTIONS
        // ==========================================

        copyBtn.addEventListener('click', async () => {
            const textToCopy = asciiOutput.textContent;
            if (!textToCopy) return;

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(textToCopy);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = textToCopy;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
                
                copyIcon.classList.add('hidden');
                copySuccessIcon.classList.remove('hidden');
                copyText.textContent = 'Copied!';
                copyBtn.classList.add('bg-emerald-500/10', 'text-emerald-500', 'border', 'border-emerald-500/20');
                
                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    copySuccessIcon.classList.add('hidden');
                    copyText.textContent = 'Copy text';
                    copyBtn.classList.remove('bg-emerald-500/10', 'text-emerald-500', 'border', 'border-emerald-500/20');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!asciiOutput.textContent) return;
            const blob = new Blob([asciiOutput.textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `img2ascii-${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

    </script>
</body>
</html>
